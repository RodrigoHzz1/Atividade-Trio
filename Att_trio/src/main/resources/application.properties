# Configurań§es do Banco de Dados (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/AttRh?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
